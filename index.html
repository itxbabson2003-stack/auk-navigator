<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AUK Navigator | HoloMap v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<div class="bg-grid"></div>
<div class="app">
  <aside class="panel" id="panel">
    <div class="panel-header">
      <div class="brand-row">
        <div class="brand-icon">A</div>
        <div class="brand-text">
          <h1>AUK NAVIGATOR</h1>
          <p>HoloMap v2 · Al-Qalam University</p>
        </div>
      </div>
      <div class="instruction-box">
        <div class="dot"></div>
        <span><b>Step 1:</b> Tap map to set "You"<br><b>Step 2:</b> Pick destination<br><b>Step 3:</b> Follow neon route</span>
      </div>
    </div>
    <div class="panel-body">
      <div class="section">
        <label>Search Campus</label>
        <div class="autocomplete">
          <input id="searchInput" class="field" type="text" placeholder="Search building, hall..." autocomplete="off" />
          <ul id="searchDropdown" class="dropdown"></ul>
        </div>
      </div>
      <div class="section">
        <label>Start Location</label>
        <select id="startSelect" class="select"><option value="">Tap map to set</option></select>
        <button id="liveLocationBtn" class="button ghost"><span></span>Use Live Location</button>
        <p id="liveStatus" class="map-note">Live location: OFF</p>
        <label style="margin-top: 18px; display: block;">Destination</label>
        <select id="destSelect" class="select"><option value="">Select destination</option></select>
        <button id="routeBtnModern" class="button neon">Generate Route</button>
        <button id="clearBtnModern" class="button ghost" style="display:none;">Clear Route</button>
      </div>
      <div class="section info-grid">
        <div class="info-card"><strong>Start</strong><span id="startLabel">Tap the map</span></div>
        <div class="info-card"><strong>Reach</strong><span id="destLabel">Select destination</span></div>
        <div class="info-card"><strong>Distance</strong><span id="distanceLabel">-- km</span></div>
      </div>
      <div class="section">
        <label>Campus Directory</label>
        <div class="location-list" id="locationList"></div>
      </div>
    </div>
  </aside>
  <main class="map-wrap">
    <div id="map"></div>
  </main>
</div>
<button class="copy-btn" id="copyBtn" onclick="copyCode()">⌘ Copy</button>
<script src="js/script.js"></script>
</body>
</html>
