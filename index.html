<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUK Navigator</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js" defer></script>
  <script src="js/script.js" defer></script>
</head>
<body>
  <div class="app">
    <div class="panel">
      <div class="panel-header">
        <div class="brand-row">
          <div class="brand-icon">R</div>
          <div class="brand-text">
            <h1>RUK Navigator</h1>
            <p>Al-Qalam University Campus Map</p>
          </div>
        </div>
        <div class="instruction-box">
          <p><b>How to use:</b> Tap map to set start point → Select destination → Get route.</p>
        </div>
      </div>
      <div class="panel-body">
        <div class="section">
          <label>Start Location</label>
          <select id="startSelect" class="select"><option value="">Tap map or select</option></select>
          <div class="info-card"><strong>Current Start</strong><span id="startLabel">Tap the map</span></div>
        </div>
        <div class="section">
          <label>Destination</label>
          <div class="autocomplete">
            <input id="searchInput" class="field" placeholder="Search location...">
            <ul id="searchDropdown" class="dropdown"></ul>
          </div>
          <select id="destSelect" class="select"><option value="">Select destination</option></select>
          <div class="info-card"><strong>To</strong><span id="destLabel">Select destination</span></div>
        </div>
        <div class="section">
          <button id="routeBtnModern" class="button">Get Route</button>
          <button id="clearBtnModern" class="button secondary" style="display:none;">Clear Route</button>
          <button id="liveLocationBtn" class="button">Use current location</button>
          <div class="info-card"><strong>Distance</strong><span id="distanceLabel">-- km</span></div>
          <div id="liveStatus" style="font-size:12px;color:var(--muted);margin-top:8px;">Live location: OFF</div>
        </div>
        <div class="section">
          <label>Campus Directory</label>
          <div id="locationList" class="location-list"></div>
        </div>
      </div>
    </div>
    <div class="map-wrap">
      <div id="map" style="width:100%;height:100vh;"></div>
    </div>
  </div>
  <button class="copy-btn" onclick="copyCode()">Copy Code</button>
</body>
</html>
